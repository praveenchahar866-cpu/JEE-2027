<script>
// ─── PWA installability: build a manifest + app icons on the fly (single-file app,
// so there's no separate manifest.json/icon file to host — we generate them in-memory
// via canvas and hand the browser blob: URLs). This is what makes "Add to Home Screen"
// on Chrome/Android launch as a real standalone app (own icon, no browser chrome,
// splash screen) instead of just a bookmark, and gives iOS Safari a proper touch icon.
(function(){
  function makeIcon(size){
    const c=document.createElement('canvas');c.width=size;c.height=size;
    const ctx=c.getContext('2d');
    const g=ctx.createLinearGradient(0,0,size,size);
    g.addColorStop(0,'#4f8ef7');g.addColorStop(1,'#a78bfa');
    ctx.fillStyle=g;
    const r=size*0.22;
    ctx.beginPath();
    ctx.moveTo(r,0);ctx.arcTo(size,0,size,size,r);ctx.arcTo(size,size,0,size,r);
    ctx.arcTo(0,size,0,0,r);ctx.arcTo(0,0,size,0,r);ctx.closePath();ctx.fill();
    ctx.fillStyle='#04102a';
    ctx.font='bold '+Math.round(size*0.32)+'px system-ui,-apple-system,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('J27',size/2,size*0.55);
    return c.toDataURL('image/png');
  }
  // Maskable icons get cropped by the OS into a circle/squircle/rounded-square
  // depending on the launcher, so all content must sit inside the inner "safe
  // zone" (~66% of the icon, centered) — a full-bleed icon (like makeIcon above)
  // gets its edges (and the "J27" text) clipped off, which is what was making
  // the installed icon look blank/generic in the app picker. This variant is
  // full-bleed square background (no rounded corners — the OS does the
  // rounding) with the logo scaled down and centered inside the safe zone.
  function makeMaskableIcon(size){
    const c=document.createElement('canvas');c.width=size;c.height=size;
    const ctx=c.getContext('2d');
    const g=ctx.createLinearGradient(0,0,size,size);
    g.addColorStop(0,'#4f8ef7');g.addColorStop(1,'#a78bfa');
    ctx.fillStyle=g;
    ctx.fillRect(0,0,size,size); // full bleed, no rounding — OS applies its own mask
    ctx.fillStyle='#04102a';
    ctx.font='bold '+Math.round(size*0.24)+'px system-ui,-apple-system,sans-serif'; // smaller so it survives cropping
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('J27',size/2,size/2);
    return c.toDataURL('image/png');
  }
  try{
    const icon192=makeIcon(192),icon512=makeIcon(512);
    const mask192=makeMaskableIcon(192),mask512=makeMaskableIcon(512);
    const manifest={
      name:"JEE2027 Hub — All-in-One Prep OS",
      short_name:"JEE2027",
      start_url:".",
      scope:".",
      display:"standalone",
      background_color:"#06060f",
      theme_color:"#0a0a18",
      orientation:"portrait",
      icons:[
        {src:icon192,sizes:"192x192",type:"image/png",purpose:"any"},
        {src:icon512,sizes:"512x512",type:"image/png",purpose:"any"},
        {src:mask192,sizes:"192x192",type:"image/png",purpose:"maskable"},
        {src:mask512,sizes:"512x512",type:"image/png",purpose:"maskable"}
      ]
    };
    const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
    const manifestURL=URL.createObjectURL(blob);
    document.getElementById('pwa-manifest-link').setAttribute('href',manifestURL);
    document.getElementById('pwa-apple-icon').setAttribute('href',icon192);
    document.getElementById('pwa-favicon').setAttribute('href',icon192);
  }catch(e){console.warn('PWA icon/manifest setup failed',e);}
})();
</script>

button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}

const SUBJ={P:{label:"Physics",color:"#f87171"},C:{label:"Chemistry",color:"#34d399"},M:{label:"Maths",color:"#4f8ef7"}};
const SUBJ_PALETTE=["#f472b6","#fb923c","#a78bfa","#22d3ee","#facc15","#4ade80","#818cf8","#fb7185"];
function ALL_SUBJ(){
  const extra={};
  (S.customSubjects||[]).forEach(s=>{extra[s.key]={label:s.label,color:s.color};});
  return{...SUBJ,...extra};
}
function _createCustomSubject(label){
  const key="X_"+label.toLowerCase().replace(/[^a-z0-9]+/g,"_").slice(0,20)+"_"+uid();
  const color=SUBJ_PALETTE[(S.customSubjects||[]).length%SUBJ_PALETTE.length];
  S.customSubjects=[...(S.customSubjects||[]),{key,label,color}];
  persist();
  showToast("✅ Added subject: "+label);
  return key;
}
// used inside an open modal (e.g. New Task) — patches the <select> in place so other
// filled-in fields (title, notes, etc.) aren't lost by a full re-render
window.addCustomSubjectInModal=function(selectElId){
  const name=prompt("New subject name (e.g. Biology, English, GK):");
  if(!name||!name.trim())return;
  const key=_createCustomSubject(name.trim());
  const el=document.getElementById(selectElId);
  if(el){
    const opt=document.createElement("option");
    opt.value=key;opt.textContent=name.trim();
    if(el.lastElementChild)el.insertBefore(opt,el.lastElementChild);else el.appendChild(opt);
    el.value=key;
  }
};
// used from a full page view (e.g. Error Log) — safe to just re-render
window.addCustomSubjectAndRender=function(onAddedField){
  const name=prompt("New subject name (e.g. Biology, English, GK):");
  if(!name||!name.trim())return;
  const key=_createCustomSubject(name.trim());
  if(onAddedField)errLogDraft[onAddedField]=key;
  render();
};

function daysBetween(a,b){return Math.floor((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/864e5);}
function rolloverXPIfNeeded(){
  if(!S.xp)S.xp={earned:0,periodStart:today_(),level:1};
  const cfg=S.xpConfig||{};
  const elapsed=daysBetween(S.xp.periodStart,today_());
  const resetDays=cfg.resetDays||14;
  if(elapsed>=resetDays){
    const target=cfg.target||200;
    if(S.xp.earned>target)S.xp.level=(S.xp.level||1)+1;
    else if(S.xp.earned<target)S.xp.level=Math.max(1,(S.xp.level||1)-1);
    // if exactly equal to target: "safe zone" — stays the same level
    S.xp.earned=0;
    S.xp.periodStart=today_();
  }
}
function awardXP(amount,reason){

// Storage abstraction: uses window.storage when available (Claude.ai artifacts),
// AND IndexedDB AND localStorage on a real browser (Netlify etc).
// WHY: Chrome (and mobile Chrome especially) can silently evict localStorage for
// sites that aren't installed/pinned, under storage pressure, or after "clear
// browsing data" runs on a schedule. Writing to all available layers at once,
// requesting persistent storage, and offering manual + cloud backup makes data
// loss extremely unlikely even if any single layer gets wiped.
const STORE={
  hasArtifactStorage: typeof window.storage!=="undefined",
  _dbp:null,
  _db(){
    if(this._dbp)return this._dbp;
    this._dbp=new Promise(resolve=>{
      if(!("indexedDB"in window)){resolve(null);return;}
      try{
        const req=indexedDB.open("jee2027hub_db",1);
        req.onupgradeneeded=()=>{try{req.result.createObjectStore("kv");}catch(e){}};
        req.onsuccess=()=>resolve(req.result);
        req.onerror=()=>resolve(null);
      }catch(e){resolve(null);}
    });
    return this._dbp;
  },
  async idbGet(key){
    const db=await this._db();if(!db)return null;
    return new Promise(res=>{
      try{
        const rq=db.transaction("kv","readonly").objectStore("kv").get(key);
        rq.onsuccess=()=>res(rq.result||null);
        rq.onerror=()=>res(null);
      }catch(e){res(null);}
    });
  },
  async idbSet(key,value){
    const db=await this._db();if(!db)return false;
    return new Promise(res=>{
      try{
        const tx=db.transaction("kv","readwrite");
        tx.objectStore("kv").put(value,key);
        tx.oncomplete=()=>res(true);
        tx.onerror=()=>res(false);
      }catch(e){res(false);}
    });
  },
  async get(key){
    if(this.hasArtifactStorage){
      try{const r=await window.storage.get(key);if(r&&r.value)return r;}catch(e){}
    }
    // Prefer whichever layer has the most recently saved payload (they should
    // match, but if one layer got wiped we fall back to whichever survived).
    let idbVal=null,lsVal=null;
    try{idbVal=await this.idbGet(key);}catch(e){}
    try{lsVal=localStorage.getItem(key);}catch(e){}
    const idbTime=idbVal?safeSavedAt(idbVal):-1;
    const lsTime=lsVal?safeSavedAt(lsVal):-1;
    if(!idbVal&&!lsVal)return null;
    const winner=idbTime>=lsTime?idbVal:lsVal;
    return winner?{key,value:winner}:null;
  },
  async set(key,value){
    let ok=false;
    if(this.hasArtifactStorage){
      try{const r=await window.storage.set(key,value);if(r)ok=true;}catch(e){}
    }
    try{if(await this.idbSet(key,value))ok=true;}catch(e){}
    try{localStorage.setItem(key,value);ok=true;}catch(e){}
    return ok?{key,value}:null;
  }
};
function safeSavedAt(v){try{return JSON.parse(v)._savedAt||0;}catch(e){return 0;}}
// Ask the browser not to auto-evict our storage under pressure. Best-effort; no-op if unsupported/denied.
if(navigator.storage&&navigator.storage.persist){
  navigator.storage.persist().then(granted=>{window._storagePersisted=granted;}).catch(()=>{});
}

// ─── Optional cloud backup (JSONBin.io) — user supplies their own free API key ───
// This is the "email / other option for storing data" safety net: an off-device
// copy that survives even if the browser wipes everything.
const CLOUD_KEY="jee2027hub_cloud_cfg";
let cloudCfg={label:"",apiKey:"",binId:"",autoSync:false};
async function loadCloudCfg(){
  try{
    const raw=localStorage.getItem(CLOUD_KEY);
    if(raw)cloudCfg={...cloudCfg,...JSON.parse(raw)};
  }catch(e){}
}
function saveCloudCfg(){try{localStorage.setItem(CLOUD_KEY,JSON.stringify(cloudCfg));}catch(e){}}
async function cloudPush(payloadStr){
  if(!cloudCfg.apiKey)return{ok:false,msg:"No API key set"};
  try{
    if(!cloudCfg.binId){
      const res=await fetch("https://api.jsonbin.io/v3/b",{method:"POST",headers:{"Content-Type":"application/json","X-Master-Key":cloudCfg.apiKey,"X-Bin-Name":cloudCfg.label||"JEE2027Hub"},body:payloadStr});
      const j=await res.json();
      if(!res.ok)return{ok:false,msg:j.message||"Create bin failed"};
      cloudCfg.binId=j.metadata.id;saveCloudCfg();

function calcStreak(){
  const past=[...S.tests].filter(t=>du(t.date)<0).reverse();
  let cur=0,best=0,tmp=0;
  for(const t of past){const sc=S.scores[t.no];if(sc&&sc.onTime){tmp++;if(tmp>best)best=tmp;}else tmp=0;}
  for(const t of past){const sc=S.scores[t.no];if(sc&&sc.onTime)cur++;else break;}
  return{cur,best};
}

function taskStreak(){
  // streak of consecutive past days where all tasks for that day were completed (and at least 1 task existed)
  let cur=0,best=0,tmp=0;
  const dates=Object.keys(S.tasksByDate).filter(d=>d<=today_()).sort();
  for(const d of dates){
    const list=S.tasksByDate[d]||[];
    if(!list.length)continue;
    const allDone=list.every(t=>t.done);
    if(allDone){tmp++;if(tmp>best)best=tmp;}else tmp=0;
  }
  // current streak = consecutive from most recent completed day backwards
  const sortedDesc=[...dates].sort().reverse();
  for(const d of sortedDesc){
    const list=S.tasksByDate[d]||[];
    if(!list.length)continue;
    if(list.every(t=>t.done))cur++;else break;
  }
  return{cur,best};
}

function aggTotals(){
  let P={correct:0,incorrect:0,skipped:0,marks:0},C={...P},M={...P};
  S.tests.forEach(t=>{

    const pt=t.pat||TYPE[t.type].pat;
    const add=(sub,src)=>{if(!src)return;sub.correct+=+src.correct||0;sub.incorrect+=+src.incorrect||0;sub.skipped+=+src.skipped||0;sub.marks+=+src.marks||0;};
    if(pt==="MAINS"||pt==="NDA_PAT"){add(P,sc.P);add(C,sc.C);add(M,sc.M);}
    else{["p1","p2"].forEach(pk=>{if(sc[pk]){add(P,sc[pk].P);add(C,sc[pk].C);add(M,sc[pk].M);}});}
  });
  return{P,C,M};
}

function sumCorrectInScore(sc,pat){
  let cor=0;

  else{["p1","p2"].forEach(pk=>{if(sc[pk]){add(sc[pk].P);add(sc[pk].C);add(sc[pk].M);}});}

}
function accuracyPct(sub){const t=(sub.correct||0)+(sub.incorrect||0)+(sub.skipped||0);return t>0?Math.round((sub.correct/t)*100):0;}
function testAccuracyPct(sc,pat){
  let cor=0,inc=0,skp=0;
  const add=s=>{if(s){cor+=+s.correct||0;inc+=+s.incorrect||0;skp+=+s.skipped||0;}};
  if(pat==="MAINS"||pat==="NDA_PAT"){add(sc.P);add(sc.C);add(sc.M);}
  else{["p1","p2"].forEach(pk=>{if(sc[pk]){add(sc[pk].P);add(sc[pk].C);add(sc[pk].M);}});}
  const t=cor+inc+skp;

}

function lineChart(data,color,maxY,h=80){
  if(!data||data.length<2)return`<div style="height:${h}px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:10px">Need ≥2 data points</div>`;
  const w=400,pad=12;
  const vals=data.map(d=>d.y);
  const mx=maxY||Math.max(...vals)||1;
  const xs=data.map((_,i)=>pad+(i/(data.length-1))*(w-2*pad));
  const ys=data.map(d=>h-pad-((d.y/mx)*(h-2*pad)));
  const path=xs.map((x,i)=>`${i===0?"M":"L"}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
  const fill=path+` L${xs[xs.length-1].toFixed(1)},${h} L${xs[0].toFixed(1)},${h} Z`;
  const gid=color.replace(/[^a-z0-9]/gi,"");
  const dots=data.map((d,i)=>`<circle cx="${xs[i].toFixed(1)}" cy="${ys[i].toFixed(1)}" r="3" fill="${color}" stroke="#0d0d1e" stroke-width="1.5"><title>${esc(d.label)}: ${d.y}</title></circle>`).join("");
  const grid=[0,25,50,75,100].filter(v=>v<=mx).map(v=>{const y=h-pad-((v/mx)*(h-2*pad));return`<line x1="${pad}" y1="${y.toFixed(1)}" x2="${w-pad}" y2="${y.toFixed(1)}" stroke="#181830" stroke-width="1"/>`;}).join("");
  return`<svg viewBox="0 0 ${w} ${h}" class="chart" style="height:${h}px"><defs><linearGradient id="g${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".22"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>${grid}<path d="${fill}" fill="url(#g${gid})"/><path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>${dots}</svg>`;
}

const MILESTONE_ALERT_THRESHOLDS=[60,30,15,10,7,5,3,2,1,0];
function seenAlertsKey(){return "jee2027hub_seen_alerts";}
function loadSeenAlerts(){try{return JSON.parse(localStorage.getItem(seenAlertsKey())||"{}");}catch(e){return{};}}
function saveSeenAlerts(o){try{localStorage.setItem(seenAlertsKey(),JSON.stringify(o));}catch(e){}}
window.requestMilestoneNotifPerm=function(silent){
  if(!("Notification" in window)){if(!silent)showToast("Notifications not supported on this device");return;}
  if(Notification.permission==="default"){
    Notification.requestPermission().then(p=>{
      if(!silent)showToast(p==="granted"?"🔔 Countdown alerts enabled":"🔕 Permission not granted");
      renderHeader();
    });
  }else if(!silent){
    showToast(Notification.permission==="granted"?"🔔 Alerts already enabled":"🔕 Notifications blocked in browser settings");
  }
};
window.updateRealityWasted=function(v){
  S.realityWastedHours=Math.max(0,+v||0);persist();openCountdownHub();
};
window.toggleMilestoneAlert=function(i){
  const m=S.milestones[i];if(!m)return;
  m.alertsOn=m.alertsOn===false?true:false;
  persist();openCountdownHub();
  showToast(m.alertsOn?"🔔 Alerts on for "+m.label:"🔕 Alerts muted for "+m.label);
};
function fireMilestoneNotification(m,d){
  const body=d===0?`${m.label} is TODAY!`:`${m.label} — only ${d} day${d===1?"":"s"} left.`;
  if("Notification" in window && Notification.permission==="granted"){
    try{new Notification("⚠️ "+m.icon+" "+m.label,{body});}catch(e){}
  }
}
function checkMilestoneAlerts(auto){
  const seen=loadSeenAlerts();
  const due=[];
  S.milestones.forEach(m=>{
    if(m.alertsOn===false)return;
    const d=du(m.date);
    if(d<0)return;
    if(MILESTONE_ALERT_THRESHOLDS.includes(d)){
      const key=m.label+"|"+m.date+"|"+d;
      if(!seen[key]){
        seen[key]=true;
        due.push({m,d});
        fireMilestoneNotification(m,d);
      }
    }
  });
  if(due.length){
    saveSeenAlerts(seen);
    openMilestoneAlertsModal(due);
  }else if(!auto){
    showToast("✅ No countdown alerts due right now");
  }
}

// Resizes+crops an uploaded image client-side (canvas) so saved photos stay
// small (fast to load, small storage footprint) before turning into base64.
function resizeImageFile(file,maxW,maxH,quality,cb){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const srcRatio=img.width/img.height,dstRatio=maxW/maxH;
      let sx=0,sy=0,sw=img.width,sh=img.height;
      if(srcRatio>dstRatio){sw=img.height*dstRatio;sx=(img.width-sw)/2;}
      else{sh=img.width/dstRatio;sy=(img.height-sh)/2;}
      const canvas=document.createElement("canvas");
      canvas.width=maxW;canvas.height=maxH;
      canvas.getContext("2d").drawImage(img,sx,sy,sw,sh,0,0,maxW,maxH);
      cb(canvas.toDataURL("image/jpeg",quality));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

// ─── Near-real-time cross-device sync ───
// There's no real login/account system here (this is a static single-file
// app with no backend of its own) — but with auto-sync ON, every device
// periodically checks the shared cloud bin and pulls in whichever copy is
// newest. Edit on your phone, wait ~30s (or open the app) on your PC, and
// it converges automatically. Closest practical equivalent to "auto-sync"
// without running a real server + login system.
let _cloudPollTimer=null;
function startCloudPolling(){
  if(_cloudPollTimer){clearInterval(_cloudPollTimer);_cloudPollTimer=null;}
  if(!cloudCfg.autoSync||!cloudCfg.apiKey||!cloudCfg.binId)return;
  _cloudPollTimer=setInterval(async()=>{
    if(document.visibilityState!=="visible")return;
    const r=await cloudPull();
    if(r.ok&&r.record&&r.record._savedAt){
      let localSavedAt=0;try{localSavedAt=+localStorage.getItem("jee2027hub_last_saved")||0;}catch(e){}
      if(r.record._savedAt>localSavedAt+2000){
        applyCloudRecord(r.record);
        render();
        showToast("☁ Synced newer data from another device");
      }
    }
  },30000);
}

if(typeof d.longestFocusSession==="number")S.longestFocusSession=d.longestFocusSession;if(typeof d.longSitLimitMin==="number")S.longSitLimitMin=d.longSitLimitMin;if(d.qTargetWeekly!==undefined)S.qTargetWeekly=d.qTargetWeekly;if(d.customSubjects)S.customSubjects=d.customSubjects;if(typeof d.realityWastedHours==="number")S.realityWastedHours=d.realityWastedHours;if(typeof d.countdownRotateSec==="number")S.countdownRotateSec=d.countdownRotateSec;if(d.screenLog)S.screenLog=d.screenLog;if(typeof d.bannerRotateSec==="number")S.bannerRotateSec=d.bannerRotateSec;if(Array.isArray(d.bannerImages))S.bannerImages=d.bannerImages;if(typeof d.bannerRotateOn==="boolean")S.bannerRotateOn=d.bannerRotateOn;if(d.bannerFitMode)S.bannerFitMode=d.bannerFitMode;if(d.appBg)S.appBg=d.appBg;

window.fbDisconnect=function(){

window.fbSignUp=async function(){
  if(!fbInit())return showToast("Connect Firebase first");
  const email=document.getElementById("fb-email").value.trim();
  const pass=document.getElementById("fb-pass").value;
  if(!email||pass.length<6)return showToast("Email + a 6+ char password needed");

window.fbLogIn=async function(){
  if(!fbInit())return showToast("Connect Firebase first");
  const email=document.getElementById("fb-email").value.trim();
  const pass=document.getElementById("fb-pass").value;
  const el=document.getElementById("fb-auth-status");
  try{

  }catch(e){if(el)el.textContent="✗ "+e.message;showToast("❌ "+e.message);}
};
window.fbSendOtp=async function(){
  if(!fbInit())return showToast("Connect Firebase first");
  const phoneEl=document.getElementById("fb-phone");
  const phone=phoneEl?phoneEl.value.trim():"";
  if(!/^\+[1-9]\d{7,14}$/.test(phone))return showToast("Enter phone with country code, e.g. +919876543210");
  const el=document.getElementById("fb-auth-status");
  try{
    if(el)el.textContent="Sending OTP…";
    if(!window._recaptchaVerifier){
      window._recaptchaVerifier=new firebase.auth.RecaptchaVerifier("recaptcha-container",{size:"invisible"});
    }
    fbConfirmationResult=await fbAuth.signInWithPhoneNumber(phone,window._recaptchaVerifier);
    fbOtpSent=true;render();openSettingsModal();
    showToast("📩 OTP sent");
  }catch(e){if(el)el.textContent="✗ "+e.message;showToast("❌ "+e.message);}
};
window.fbVerifyOtp=async function(){
  const otpEl=document.getElementById("fb-otp");
  const code=otpEl?otpEl.value.trim():"";
  if(!fbConfirmationResult||!code)return showToast("Enter the OTP code");
  const el=document.getElementById("fb-auth-status");
  try{
    if(el)el.textContent="Verifying…";
    await fbConfirmationResult.confirm(code);
    await fbPushNow();
    fbOtpSent=false;
    showToast("✅ Logged in via phone & data uploaded");
  }catch(e){if(el)el.textContent="✗ "+e.message;showToast("❌ "+e.message);}
};
window.fbLogOut=async function(){
  if(fbUnsub){fbUnsub();fbUnsub=null;}
  if(fbAuth)await fbAuth.signOut();
  fbUser=null;showToast("Logged out (data stays saved on this device)");render();openSettingsModal();
};
function fbStartSync(user){
  fbUser=user;
  if(fbUnsub)fbUnsub();
  const ref=fbDb.collection("users").doc(user.uid).collection("data").doc("main");
  fbUnsub=ref.onSnapshot(snap=>{
    if(snap.exists){
      const d=snap.data();
      if((d._savedAt||0)>_lastAppliedRemote){
        _lastAppliedRemote=d._savedAt||Date.now();
        applyCloudRecord(d);
        persistLocalOnly();render();
        showToast("🔄 Synced from your account");
      }
    }
  },err=>console.warn("Firestore sync error",err));
}
async function fbPushNow(){
  if(!fbUser||!fbDb)return;
  try{
    const payload=JSON.parse(buildStatePayload());
    _lastAppliedRemote=payload._savedAt;
    await fbDb.collection("users").doc(fbUser.uid).collection("data").doc("main").set(payload,{merge:true});
  }catch(e){console.warn("Firestore push failed",e);}
}
// try silent init at load (if already configured previously)
if(fbInit()){
  fbAuth.onAuthStateChanged(u=>{
    if(u)fbStartSync(u);
    else{fbUser=null;if(fbUnsub){fbUnsub();fbUnsub=null;}}
  });
}

// Positions the live "now" line inside the timeline based on elapsed time since
// 5:00 AM today (wrapping past midnight to 4:59 AM), so it visibly slides down
// as the day progresses instead of sitting still. While a task is being focused,
// its title + live elapsed time ride along inside the NOW badge, so the task
// visibly "moves down" the timeline in step with real time instead of staying
// pinned to its original scheduled slot.
function updateTimelineNowLine(){
  const line=document.getElementById("timeline-now-line");
  const container=document.getElementById("timeline-container");
  if(!line||!container)return;
  const now=new Date();
  let hoursSince5=now.getHours()-5;if(hoursSince5<0)hoursSince5+=24;
  const fracHour=hoursSince5+now.getMinutes()/60+now.getSeconds()/3600;
  const rows=container.querySelectorAll(".timeline-hour-row");
  if(!rows.length)return;
  const rowIdx=Math.min(Math.floor(fracHour),rows.length-1);
  const row=rows[rowIdx];
  const within=fracHour-rowIdx;
  const top=row.offsetTop+within*row.offsetHeight;
  line.style.top=top+"px";
}
// Ticks the little live-elapsed counter shown on a task's block in the
// Timeline while it's being focused, so it visibly counts up (like YPT)
// instead of sitting static. No-ops if the Timeline isn't currently on screen.
function updateTimelineElapsedBadge(){
  const el=document.getElementById("timeline-elapsed-badge");
  if(el)el.textContent=fmtHMS(timerState.seconds);
  const nb=document.getElementById("timeline-now-badge");
  if(nb&&S.timerLinkedTask&&timerState.running){
    const t=(S.tasksByDate[S.timerLinkedTask.date]||[]).find(x=>x.id===S.timerLinkedTask.taskId);
    nb.textContent=`🔴 ${t?t.title:S.timerLinkedTask.title||""} · ${fmtHMS(timerState.seconds)}`;
  }
}
let timelineNowInterval=null;
function startTimelineNowLoop(){
  stopTimelineNowLoop();
  updateTimelineNowLine();

}

function taskDurationLabel(t){
  if(!t.time||!t.timeEnd)return"";
  const[h1,m1]=t.time.split(":").map(Number);const[h2,m2]=t.timeEnd.split(":").map(Number);
  let mins=(h2*60+m2)-(h1*60+m1);
  if(mins<0)mins+=24*60;
  if(mins<=0)return"";
  const h=Math.floor(mins/60),m=mins%60;
  return`${h?h+"h ":""}${m?m+"m":""}`.trim();
}

window.adjTaskQCount=function(taskId,delta){
  const list=S.tasksByDate[S.taskDate]||[];
  const t=list.find(x=>x.id===taskId);
  if(!t)return;
  const oldQ=t.qCount||0;
  t.qCount=Math.max(0,oldQ+delta);
  const diff=t.qCount-oldQ;
  // auto-link to Question Tracker for this date
  const subjMap={P:"P",C:"C",M:"M"};
  const key=subjMap[t.subjectKey];
  if(key&&diff!==0){
    if(!S.qLog[S.taskDate])S.qLog[S.taskDate]={P:0,C:0,M:0,Lectures:0};
    S.qLog[S.taskDate][key]=Math.max(0,(+S.qLog[S.taskDate][key]||0)+diff);
  }
  if(diff>0)awardXP(diff*(S.xpConfig.perQuestionDaily||0),diff+" question(s) logged");
  persist();render();
};

window.saveNewTask=function(editId,origDate){
  const date=document.getElementById("ti-date").value||S.taskDate;
  const subjectKey=document.getElementById("ti-subject").value;
  const title=document.getElementById("ti-title").value.trim();
  const subsRaw=document.getElementById("ti-subs").value.trim();
  const link=document.getElementById("ti-link").value.trim();
  const timeVal=document.getElementById("ti-time")?document.getElementById("ti-time").value:"";
  const timeEndVal=document.getElementById("ti-timeEnd")?document.getElementById("ti-timeEnd").value:"";
  const alsoTomorrow=document.getElementById("ti-tomorrow")?document.getElementById("ti-tomorrow").checked:false;
  if(!title){showToast("Enter a task title");return;}
  const subtasks=subsRaw?subsRaw.split("\n").map(x=>x.trim()).filter(Boolean).map(text=>({id:uid(),text,done:false})):[];

  if(editId){
    // edit existing — handle possible date change by moving between buckets
    const oldList=S.tasksByDate[origDate]||[];
    const existing=oldList.find(x=>x.id===editId);
    if(existing){
      existing.subjectKey=subjectKey;
      existing.subject=ALL_SUBJ()[subjectKey]?ALL_SUBJ()[subjectKey].label:"General";
      existing.title=title;
      existing.link=link;
      existing.time=timeVal;
      existing.timeEnd=timeEndVal;
      // merge subtasks: keep done-state for matching text, else new
      const oldSubsByText={};existing.subtasks.forEach(s=>oldSubsByText[s.text]=s);
      existing.subtasks=subtasks.map(s=>oldSubsByText[s.text]?{...oldSubsByText[s.text]}:s);
      if(date!==origDate){
        S.tasksByDate[origDate]=oldList.filter(x=>x.id!==editId);
        if(!S.tasksByDate[date])S.tasksByDate[date]=[];
        S.tasksByDate[date].push(existing);
        S.taskDate=date;
      }
    }
  }else{
    const repeatId=uid();
    const mkTask=()=>({id:uid(),subjectKey,subject:ALL_SUBJ()[subjectKey]?ALL_SUBJ()[subjectKey].label:"General",title,subtasks:JSON.parse(JSON.stringify(subtasks)),done:false,link,qCount:0,minutes:0,notes:"",time:timeVal,timeEnd:timeEndVal});
    if(!S.tasksByDate[date])S.tasksByDate[date]=[];
    S.tasksByDate[date].push(mkTask());
    if(alsoTomorrow){
      const dt=new Date(date+"T00:00:00");dt.setDate(dt.getDate()+1);const tmrw=ymd(dt);
      if(!S.tasksByDate[tmrw])S.tasksByDate[tmrw]=[];
      S.tasksByDate[tmrw].push(mkTask());
    }
    const repeatSel=document.getElementById("ti-repeat");
    const repeatType=repeatSel?repeatSel.value:"none";
    if(repeatType!=="none"){
      const span=Math.max(1,Math.min(365,+((document.getElementById("ti-repeat-span")||{}).value)||60));
      const chosenDays=Array.from(document.querySelectorAll(".ti-rday:checked")).map(el=>+el.value);
      const startDt=new Date(date+"T00:00:00");
      for(let i=1;i<=span;i++){
        const dt=new Date(startDt);dt.setDate(dt.getDate()+i);
        const ds=ymd(dt);
        const dow=dt.getDay();
        const include=repeatType==="daily"||(repeatType==="weekly"&&chosenDays.includes(dow));
        if(include){
          if(!S.tasksByDate[ds])S.tasksByDate[ds]=[];
          const rt=mkTask();rt.repeat={type:repeatType,days:chosenDays};rt.repeatId=repeatId;
          S.tasksByDate[ds].push(rt);
        }
      }
      showToast("🔁 Repeating task created");
    }
    S.taskDate=date;
  }
  persist();closeModal();render();showToast(editId?"Task updated":"Task added for "+fmtF(date));
};

function focusXPForSession(mode,minutes,restricted){
  const cfg=S.xpConfig||{};
  if(minutes<=0)return 0;
  if(restricted)return Math.floor(minutes/(cfg.focusAppPerMin||1))*(cfg.focusAppPerAmt||0);
  if(mode==="flow")return Math.floor(minutes/(cfg.focusSimplePerMin||3))*(cfg.focusSimplePerAmt||0);
  return Math.floor(minutes/(cfg.focusStructPerMin||3))*(cfg.focusStructPerAmt||0);
}
function playFocusSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();const g=ctx.createGain();
    o.type="sine";o.frequency.setValueAtTime(660,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(880,ctx.currentTime+.12);
    g.gain.setValueAtTime(.18,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.35);
    o.connect(g);g.connect(ctx.destination);
    o.start();o.stop(ctx.currentTime+.35);
  }catch(e){/* audio not supported/allowed — ignore */}
}
function todayAndWeekTasks(){
  // gather today's tasks + this week's tasks (undone first) for picker
  const wd=weekDates(S.weekStart);
  const seen={};
  const out=[];
  [S.taskDate,...wd,today_()].forEach(d=>{
    (S.tasksByDate[d]||[]).forEach(t=>{
      if(seen[t.id])return;seen[t.id]=true;
      out.push({...t,date:d});
    });
  });
  return out.sort((a,b)=>(a.done===b.done)?0:(a.done?1:-1));
}

function focusAnalyticsHTML(){
  const log=S.focusDailyLog||{};
  const fmtMH=m=>`${Math.floor(m/60)}h ${m%60}m`;
  // Top stat tiles
  const streak=calcFocusStreak();
  const focusedToday=+log[today_()]||0;
  const last7=[];for(let i=0;i<7;i++){const dt=new Date();dt.setDate(dt.getDate()-i);last7.push(+log[ymd(dt)]||0);}
  const avg7=Math.round(last7.reduce((a,b)=>a+b,0)/7);
  const peak7=Math.max(0,...last7);
  const last30=[];for(let i=0;i<30;i++){const dt=new Date();dt.setDate(dt.getDate()-i);last30.push(+log[ymd(dt)]||0);}
  const consistency=Math.round((last30.filter(v=>v>0).length/30)*100);
  const sessCount=timerState.sessions.length||1;
  const avgSession=timerState.sessions.length?Math.round(timerState.sessions.reduce((a,s)=>a+s.mins,0)/timerState.sessions.length):0;
  const hourLog=S.focusHourLog||{};
  const morningMins=Object.entries(hourLog).filter(([h])=>+h<12).reduce((a,[,v])=>a+v,0);
  const eveningMins=Object.entries(hourLog).filter(([h])=>+h>=17).reduce((a,[,v])=>a+v,0);
  const chronotype=morningMins===0&&eveningMins===0?"—":morningMins>=eveningMins?"Early Bird":"Night Owl";
  let wkdMins=0,wkeMins=0;
  Object.entries(log).forEach(([ds,v])=>{const dow=new Date(ds+"T00:00:00").getDay();if(dow===0||dow===6)wkeMins+=+v;else wkdMins+=+v;});

  // Study Trends: current week Mon..Sun
  const wkStart=weekStartOf(today_());
  const wdays=weekDates(wkStart);
  const wVals=wdays.map(d=>+log[d]||0);
  const wMax=Math.max(30,...wVals);
  const dayLbl=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  // 30-Day Momentum
  const days30=[];for(let i=29;i>=0;i--){const dt=new Date();dt.setDate(dt.getDate()-i);days30.push(ymd(dt));}
  const v30=days30.map(d=>+log[d]||0);
  const max30=Math.max(1,...v30);
  const w=300,h=70;
  const pts=v30.map((v,i)=>`${(i/(v30.length-1))*w},${h-(v/max30)*h}`).join(" ");
  const total30=v30.reduce((a,b)=>a+b,0);
  // Monthly heatmap (current month)
  const now=new Date();const y=now.getFullYear(),m=now.getMonth();
  const firstDow=(new Date(y,m,1).getDay()+6)%7; // Mon=0
  const daysInMonth=new Date(y,m+1,0).getDate();
  const cells=[];for(let i=0;i<firstDow;i++)cells.push(null);
  for(let dnum=1;dnum<=daysInMonth;dnum++){const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(dnum).padStart(2,"0")}`;cells.push({dnum,ds,mins:+log[ds]||0});}
  const heatColor=mins=>mins<=0?"#12122a":mins<30?"#0e3a2a":mins<90?"#0f6b45":mins<180?"#12a35c":"#22d97a";
  return `
  <div class="g2" style="margin-bottom:8px">
    ${[["🔥",streak,"DAY"+(streak===1?"":"S")+" STREAK"],["⏱",fmtMH(focusedToday),"FOCUSED TODAY"],["📊",fmtMH(avg7),"7-DAY AVG"],["🏆",fmtMH(peak7),"7-DAY PEAK"]].map(([ic,v,l])=>`
    <div class="card" style="text-align:center;padding:10px 6px">
      <div style="font-size:15px">${ic}</div>
      <div style="font-size:8px;color:var(--muted);font-weight:800;letter-spacing:.4px;margin-top:2px">${l}</div>
      <div style="font-size:16px;font-weight:900;margin-top:2px">${v}</div>
    </div>`).join("")}
  </div>
  <div class="g2" style="margin-bottom:8px">
    ${[["🎯",consistency+"%","CONSISTENCY (30D)"],["⚡",fmtMH(avgSession),"AVG SESSION"],["🌙",chronotype,"CHRONOTYPE"],["🏅",fmtMH(S.longestFocusSession||0),"LONGEST FOCUS (NO BREAK)"]].map(([ic,v,l])=>`
    <div class="card" style="text-align:center;padding:10px 6px">
      <div style="font-size:15px">${ic}</div>
      <div style="font-size:8px;color:var(--muted);font-weight:800;letter-spacing:.4px;margin-top:2px">${l}</div>
      <div style="font-size:13px;font-weight:900;margin-top:2px">${v}</div>
    </div>`).join("")}
  </div>
  <div class="card">
    <div class="card-title">📈 Study Trends — This Week</div>
    <div style="display:flex;align-items:flex-end;gap:6px;height:80px;padding-top:6px">
      ${wVals.map((v,i)=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
        <div style="width:100%;max-width:22px;height:${Math.max(2,(v/wMax)*64)}px;background:${wdays[i]===today_()?"#4f8ef7":"#2dd4bf"};border-radius:4px 4px 0 0"></div>
        <div style="font-size:8px;color:var(--muted)">${dayLbl[i]}</div>
      </div>`).join("")}
    </div>
  </div>
  <div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between"><span>📉 30-Day Momentum</span><span style="color:var(--muted);font-weight:600;font-size:9px">TOTAL: ${Math.floor(total30/60)}h ${total30%60}m</span></div>
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:70px" preserveAspectRatio="none">
      <polyline points="${pts}" fill="none" stroke="#4f8ef7" stroke-width="2"/>
    </svg>
  </div>
  <div class="card">
    <div class="card-title">🗓 Monthly Focus Heatmap — ${now.toLocaleDateString("en-IN",{month:"long",year:"numeric"})}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">
      ${["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>`<div style="font-size:7px;color:var(--muted);text-align:center;font-weight:800">${d}</div>`).join("")}
      ${cells.map(c=>c?`<div title="${c.ds}: ${c.mins}m" style="aspect-ratio:1;border-radius:5px;background:${heatColor(c.mins)};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:${c.mins>0?"#fff":"var(--muted)"}">${c.dnum}</div>`:`<div></div>`).join("")}
    </div>
  </div>`;
}

function addFocusMinutesToLinkedTask(mins){

  const lt=S.timerLinkedTask;
  const t=(S.tasksByDate[lt.date]||[]).find(x=>x.id===lt.taskId);
  if(t)t.minutes=(+t.minutes||0)+mins;

function fmtHMS(sec){const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return[h,m,s].map(x=>String(x).padStart(2,"0")).join(":");}
function initTimerDisplay(){updateTimerDigits();}
function updateTimerDigits(){
  const el=document.getElementById("timer-digits");
  if(!el)return;
  let display;
  if(S.timerMode==="flow"){display=fmtHMS(timerState.seconds);}
  else{
    const totalSec=(timerState.phase==="work"?S.pomoWorkMin:S.pomoBreakMin)*60;
    const remain=Math.max(0,totalSec-timerState.seconds);
    display=fmtHMS(remain);
  }
  el.textContent=display;
  const playbtn=document.getElementById("timer-playbtn");
  if(playbtn)playbtn.textContent=timerState.running?"⏸":"▶";
}
function logSessionQuestions(){
  const bySubj=timerState.sessionQBySubj||{P:0,C:0,M:0};
  const total=(+bySubj.P||0)+(+bySubj.C||0)+(+bySubj.M||0);
  if(total<=0)return;
  if(!S.qLog[today_()])S.qLog[today_()]={P:0,C:0,M:0,Lectures:0};
  ["P","C","M"].forEach(k=>{
    const n=+bySubj[k]||0;
    if(n>0)S.qLog[today_()][k]=(+S.qLog[today_()][k]||0)+n;
  });
  awardXP(total*(S.xpConfig.perQuestionDaily||0),total+" question(s) in session");
  persist();
}

window.dismissLongSit=function(action){

function checkLongSit(){
  const limitSec=(S.longSitLimitMin||90)*60;
  if(limitSec<=0)return;
  if(timerState.seconds>0&&timerState.seconds%limitSec===0&&timerState._longSitAcked!==timerState.seconds){
    timerState._longSitAcked=timerState.seconds;
    clearInterval(timerState.intervalId);timerState.running=false;
    playFocusSound();
    const hrs=(timerState.seconds/3600).toFixed(1);
    document.getElementById("modal-root").innerHTML=`
    <div class="modal-overlay">
      <div class="modal-box" style="text-align:center">

        <div style="display:flex;gap:8px">

window.toggleTimer=function(){
  if(!timerState.running&&!S.timerLinkedTask&&!timerState._skipPick){
    openTaskPicker(true);
    return;
  }
  if(timerState.running){
    clearInterval(timerState.intervalId);timerState.running=false;
  }else{
    playFocusSound();
    timerState.running=true;
    timerState.intervalId=setInterval(()=>{
      timerState.seconds++;
      updateTimelineElapsedBadge();
      checkLongSit();
      if(!timerState.running)return; // checkLongSit may have paused us — bail before touching phase logic
      if(S.timerMode==="pomodoro"||S.timerMode==="custom"){
        const limitMin=S.timerMode==="custom"?S.customMin:(timerState.phase==="work"?S.pomoWorkMin:S.pomoBreakMin);
        if(timerState.seconds>=limitMin*60){
          if(S.timerMode==="custom"){
            timerState.sessions.push({subject:S.timerSubject,mins:S.customMin,task:S.timerLinkedTask?S.timerLinkedTask.title:"",q:timerState.sessionQCount,name:timerState.sessionName});recordFocusSessionLength(S.customMin);
            logSessionQuestions();
            awardXP(focusXPForSession("custom",S.customMin,timerState.restricted),"Focus session");addFocusMinutes(S.customMin);addFocusMinutesToLinkedTask(S.customMin);
            clearInterval(timerState.intervalId);timerState.running=false;timerState.seconds=0;timerState.sessionQCount=0;timerState.sessionQBySubj={P:0,C:0,M:0};timerState.sessionName="";
            playFocusSound();
            showToast("⏰ Session complete!");render();return;
          }else{
            if(timerState.phase==="work"){
              timerState.sessions.push({subject:S.timerSubject,mins:S.pomoWorkMin,task:S.timerLinkedTask?S.timerLinkedTask.title:"",q:timerState.sessionQCount,name:timerState.sessionName});recordFocusSessionLength(S.pomoWorkMin);
              logSessionQuestions();
              awardXP(focusXPForSession("pomodoro",S.pomoWorkMin,timerState.restricted),"Focus session");addFocusMinutes(S.pomoWorkMin);addFocusMinutesToLinkedTask(S.pomoWorkMin);
              timerState.sessionQCount=0;timerState.sessionQBySubj={P:0,C:0,M:0};
            }
            timerState.phase=timerState.phase==="work"?"break":"work";
            timerState.seconds=0;
            playFocusSound();
            showToast(timerState.phase==="break"?"☕ Break time":"🎯 Back to focus");
            render();return;
          }
        }
      }
      updateTimerDigits();
    },1000);
  }
  const btn=document.getElementById("timer-playbtn");if(btn)btn.textContent=timerState.running?"⏸":"▶";
};
window.resetTimer=function(){
  if(timerState.seconds>10){
    const mins=Math.round(timerState.seconds/60);
    timerState.sessions.push({subject:S.timerSubject,mins,task:S.timerLinkedTask?S.timerLinkedTask.title:"",q:timerState.sessionQCount,name:timerState.sessionName});recordFocusSessionLength(mins);
    logSessionQuestions();
    awardXP(focusXPForSession(S.timerMode,mins,timerState.restricted),"Focus session");addFocusMinutes(mins);addFocusMinutesToLinkedTask(mins);persist();
  }
  clearInterval(timerState.intervalId);
  timerState={running:false,mode:S.timerMode,seconds:0,phase:"work",intervalId:null,sessions:timerState.sessions,sessionQCount:0,sessionQBySubj:{P:0,C:0,M:0},restricted:false,sessionName:"",logTimeToTask:true};
  render();
};

function weekDates(start){const out=[];const d=new Date(start+"T00:00:00");for(let i=0;i<7;i++){out.push(ymd(d));d.setDate(d.getDate()+1);}return out;}
function weekKey(start){return start;}
const DAY_OPTS=[["","Day"],["MO","Mon"],["TU","Tue"],["WE","Wed"],["TH","Thu"],["FR","Fri"],["SA","Sat"],["SU","Sun"]];
function dayOptsHtml(sel){return DAY_OPTS.map(([v,l])=>`<option value="${v}" ${sel===v?"selected":""}>${l}</option>`).join("");}
function viewWeekly(){
  const wd=weekDates(S.weekStart);
  const wk=weekKey(S.weekStart);
  const goals=S.weeklyGoals[wk]||[]; // array of {id,subject,topic,qDone,qTarget}
  let tasksTotal=0,tasksDone=0,weekQTotal=0;
  wd.forEach(d=>{
    const list=S.tasksByDate[d]||[];tasksTotal+=list.length;tasksDone+=list.filter(t=>t.done).length;
    const q=S.qLog[d];if(q)weekQTotal+=(+q.P||0)+(+q.C||0)+(+q.M||0);
  });
  const fmtSlash=ds=>{const[y,m,d]=ds.split("-");return `${+d}/${+m}/${y}`;};
  const weekLabel=`${fmtSlash(wd[0])}-${fmtSlash(wd[6])}`;

  return `
  <div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px">
    <button class="btn btn-sm" style="background:#1a1a30;color:var(--txt)" onclick="shiftWeek(-1)">‹</button>
    <div style="text-align:center"><div style="font-weight:900;font-size:13px">${weekLabel}</div><div style="font-size:9px;color:var(--muted)">Week Plan (Mon–Sun)</div></div>
    <button class="btn btn-sm" style="background:#1a1a30;color:var(--txt)" onclick="shiftWeek(1)">›</button>
  </div>
  <div style="display:flex;gap:6px;margin:-4px 0 2px">
    <button class="btn-xs" style="flex:1;padding:7px;background:${S.weeklyShowDays?"#1a1a30":"var(--accent)"};color:${S.weeklyShowDays?"var(--txt)":"#04102a"};border:1px solid var(--border);font-weight:800" onclick="setWeeklyDayDivide(false)">📅 Week Summary</button>
    <button class="btn-xs" style="flex:1;padding:7px;background:${S.weeklyShowDays?"var(--accent)":"#1a1a30"};color:${S.weeklyShowDays?"#04102a":"var(--txt)"};border:1px solid var(--border);font-weight:800" onclick="setWeeklyDayDivide(true)">📆 Day-wise Divide</button>
  </div>
  ${S.weeklyShowDays?wd.map(d=>{
    const list=S.tasksByDate[d]||[];const done=list.filter(t=>t.done).length;
    const q=S.qLog[d];const qTot=q?(+q.P||0)+(+q.C||0)+(+q.M||0):0;
    const dow=new Date(d+"T00:00:00").toLocaleDateString("en-IN",{weekday:"long"});
    const isToday=d===today_();
    return `
    <div class="card" style="cursor:pointer;padding:10px 12px;${isToday?"border:1px solid var(--accent)":""}" onclick="openDayFromWeekly('${d}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><span style="font-weight:900;font-size:12px">${dow}</span><span style="font-size:9px;color:var(--muted);margin-left:6px">${fmtSlash(d)}</span>${isToday?`<span class="pill" style="background:var(--accent)22;color:var(--accent);margin-left:6px;font-size:8px">TODAY</span>`:""}</div>
        <div style="font-size:9px;color:var(--muted)">${done}/${list.length} tasks · ${qTot} Qs</div>
      </div>
    </div>`;
  }).join(""):""}

  <div class="card">
    <div class="card-title">📋 Weekly PCM Topic Goals</div>
    ${goals.length?goals.map(g=>{
      const pct=g.qTarget?Math.min(100,Math.round((g.qDone/g.qTarget)*100)):0;
      const subs=g.subtasks||[];
      const subDone=subs.filter(s=>s.done).length;
      const gexp=!!weeklyGoalExpSet[g.id];
      return `
      <div style="background:#0a0a18;border-radius:9px;padding:9px 11px;margin-bottom:7px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;cursor:pointer" onclick="toggleWeeklyGoalExpand('${g.id}')">
          <span class="pill" style="background:${SUBJ[g.subject].color}22;color:${SUBJ[g.subject].color}">${SUBJ[g.subject].label}</span>
          <span style="flex:1;font-size:12px;font-weight:700">${esc(g.topic)}</span>
          <span style="font-size:9px;color:var(--muted)">${subDone}/${subs.length||0} · ${pct}%</span>
          <span style="font-size:9px;color:var(--muted)">${gexp?"▲":"▼"}</span>
        </div>
        ${subs.length?`<div style="margin-top:2px">
          ${subs.map(st=>`
            <div class="task-sub-row">
              <div class="chk ${st.done?"on":""}" style="width:15px;height:15px;font-size:9px" onclick="toggleWeeklyGoalSubtask('${g.id}','${st.id}')">${st.done?"✓":""}</div>
              <input class="finput" value="${esc(st.text)}" style="font-size:12px;flex:1;${st.done?"text-decoration:line-through;color:var(--muted)":""}" onchange="renameWeeklyGoalSubtask('${g.id}','${st.id}',this.value)">
              ${gexp?`<select class="finput" style="max-width:62px;font-size:10px;padding:3px 4px" onchange="setWeeklyGoalSubtaskDay('${g.id}','${st.id}',this.value)">${dayOptsHtml(st.day)}</select>
              <button class="btn-xs del-btn" style="background:none;color:var(--muted)" onclick="deleteWeeklyGoalSubtask('${g.id}','${st.id}')">✕</button>`:""}
            </div>`).join("")}
        </div>`:""}
        <div style="margin-top:5px;display:flex;gap:5px">
          <input id="wgs-input-${g.id}" class="finput" placeholder="↳ Add subtask…" style="font-size:11px;flex:1" onkeydown="if(event.key==='Enter'&&this.value.trim()){addWeeklyGoalSubtask('${g.id}',this.value.trim());this.value=''}">
          <button class="btn-xs" style="background:#1a1a30;color:var(--accent);border:1px solid var(--border);padding:0 12px;font-weight:900;font-size:14px" onclick="const el=document.getElementById('wgs-input-${g.id}');if(el.value.trim()){addWeeklyGoalSubtask('${g.id}',el.value.trim());}">+</button>
        </div>
        ${gexp?`
        <div style="margin-top:8px;border-top:1px solid var(--border);padding-top:7px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:7px">
            <select class="finput" style="max-width:74px;font-size:10px;padding:3px 4px" onchange="setWeeklyGoalDay('${g.id}',this.value)">${dayOptsHtml(g.day)}</select>
            <input class="finput" value="${esc(g.topic)}" style="flex:1;font-size:12px" onchange="renameWeeklyGoal('${g.id}',this.value)" placeholder="Rename topic">
            <button class="btn-xs del-btn" style="background:none;color:var(--muted)" onclick="deleteWeeklyGoal('${g.id}')">🗑</button>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <button class="btn-xs" style="background:#1a1a30;color:var(--txt);font-size:13px;padding:3px 9px" onclick="adjWeeklyGoalQ('${g.id}',-1)">−</button>
            <input type="number" class="finput" value="${g.qDone}" style="max-width:55px;font-size:12px;font-weight:800;text-align:center" onchange="setWeeklyGoalDone('${g.id}',this.value)">
            <span style="font-size:12px;font-weight:800">/</span>
            <input type="number" class="finput" value="${g.qTarget}" style="max-width:50px;font-size:11px" onchange="setWeeklyGoalTarget('${g.id}',this.value)">
            <button class="btn-xs" style="background:#1a1a30;color:var(--txt);font-size:13px;padding:3px 9px" onclick="adjWeeklyGoalQ('${g.id}',1)">+</button>
            <div style="flex:1"><div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:${SUBJ[g.subject].color}"></div></div></div>
          </div>
          <button class="btn-xs" style="width:100%;margin-top:7px;background:#1a1a30;color:var(--muted);border:1px solid var(--border);font-size:9px" onclick="openBulkSubtaskModal('${g.id}')">☰+ Add several subtasks at once</button>
        </div>`:""}
      </div>`;
    }).join(""):`<div style="font-size:10px;color:var(--muted);margin-bottom:8px">No topic goals yet — e.g. "Master Electrostatics" with a question target.</div>`}
    <div style="display:flex;gap:6px;margin-top:4px">
      <select id="wg-subject" class="finput" style="max-width:90px">
        <option value="P">Physics</option><option value="C">Chemistry</option><option value="M">Maths</option>
      </select>
      <input id="wg-topic" class="finput" placeholder="e.g. Master Electrostatics" style="flex:1">
      <input id="wg-target" type="number" class="finput" placeholder="Qs" style="max-width:60px">
    </div>
    <button class="btn btn-sm" style="width:100%;margin-top:6px;background:var(--accent);color:#04102a;padding:7px" onclick="addWeeklyGoal()">+ Add Topic Goal</button>
  </div>

  <div class="card" style="cursor:pointer" onclick="openDayFromWeekly('${S.weekStart}')">
    <div class="card-title">This Week Summary — ${weekLabel}</div>
    <div class="g2">
      <div style="text-align:center;background:#0a0a18;border-radius:9px;padding:9px">
        <div style="font-size:18px;font-weight:900;color:var(--accent)">${tasksTotal?Math.round((tasksDone/tasksTotal)*100):0}%</div>
        <div style="font-size:8px;color:var(--muted)">TASKS DONE (${tasksDone}/${tasksTotal})</div>
      </div>
      <div style="text-align:center;background:#0a0a18;border-radius:9px;padding:9px">
        <div style="font-size:18px;font-weight:900;color:var(--green)">${weekQTotal}</div>
        <div style="font-size:8px;color:var(--muted)">TOTAL QUESTIONS</div>
      </div>
    </div>
    <div style="font-size:9px;color:var(--muted);text-align:center;margin-top:8px">Tap to open Tasks for this week →</div>
  </div>
  `;
}
window.toggleWeeklyGoalExpand=function(id){weeklyGoalExpSet[id]=!weeklyGoalExpSet[id];render();};
window.shiftWeek=function(n){const d=new Date(S.weekStart+"T00:00:00");d.setDate(d.getDate()+7*n);S.weekStart=ymd(d);render();};
window.setWeeklyDayDivide=function(v){S.weeklyShowDays=v;persist();render();};
window.addWeeklyGoal=function(){
  const subject=document.getElementById("wg-subject").value;
  const topic=document.getElementById("wg-topic").value.trim();
  const target=+document.getElementById("wg-target").value||0;
  if(!topic){showToast("Enter a topic name");return;}
  const wk=weekKey(S.weekStart);
  if(!S.weeklyGoals[wk])S.weeklyGoals[wk]=[];
  S.weeklyGoals[wk].push({id:uid(),subject,topic,qDone:0,qTarget:target||10,subtasks:[],day:""});
  persist();render();
};
window.adjWeeklyGoalQ=function(id,delta){
  const wk=weekKey(S.weekStart);
  const g=(S.weeklyGoals[wk]||[]).find(x=>x.id===id);
  if(g){
    g.qDone=Math.max(0,g.qDone+delta);
    if(g.qDone>=g.qTarget&&!g.xpAwarded){
      g.xpAwarded=true;
      awardXP(S.xpConfig.perWeeklyTaskComplete,"Weekly goal completed: "+g.topic);
    }
  }
  persist();render();
};
window.setWeeklyGoalDone=function(id,val){
  const wk=weekKey(S.weekStart);
  const g=(S.weeklyGoals[wk]||[]).find(x=>x.id===id);
  if(g){
    g.qDone=Math.max(0,+val||0);
    if(g.qDone>=g.qTarget&&!g.xpAwarded){
      g.xpAwarded=true;
      awardXP(S.xpConfig.perWeeklyTaskComplete,"Weekly goal completed: "+g.topic);
    }
  }
  persist();render();
};
window.renameWeeklyGoal=function(id,val){
  const wk=weekKey(S.weekStart);
  const g=(S.weeklyGoals[wk]||[]).find(x=>x.id===id);
  if(g)g.topic=val;
  persist();render();
};
window.setWeeklyGoalTarget=function(id,val){
  const wk=weekKey(S.weekStart);
  const g=(S.weeklyGoals[wk]||[]).find(x=>x.id===id);
  if(g)g.qTarget=+val||1;
  persist();render();
};
window.deleteWeeklyGoal=function(id){
  const wk=weekKey(S.weekStart);
  S.weeklyGoals[wk]=(S.weeklyGoals[wk]||[]).filter(x=>x.id!==id);
  persist();render();
};
window.addWeeklyGoalSubtask=function(gid,text){
  const wk=weekKey(S.weekStart);
  const g=(S.weeklyGoals[wk]||[]).find(x=>x.id===gid);
  if(g){if(!g.subtasks)g.subtasks=[];g.subtasks.push({id:uid(),text,done:false,day:""});}
  persist();render();
};
window.openBulkSubtaskModal=function(gid){
  document.getElementById("modal-root").innerHTML=`
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-box modal-scroll">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px"><div style="font-weight:900;font-size:15px">+ Add Multiple Subtasks</div><button onclick="closeModal()" style="background:none;border:none;color:var(--muted);font-size:18px">✕</button></div>
      <div class="lbl">One subtask per line</div>
      <textarea id="bulk-subs" class="finput" placeholder="e.g.\nRead Chapter 4\nSolve DPP 12\nRevise formulas" style="min-height:120px;margin-bottom:12px"></textarea>
      <button class="btn" style="width:100%;padding:10px;background:var(--accent);color:#04102a" onclick="saveBulkSubtasks('${gid}')">Add Subtasks</button>
    </div>
  </div>`;
};
window.saveBulkSubtasks=function(gid){
  const raw=document.getElementById("bulk-subs").value;
  const lines=raw.split("\n").map(l=>l.trim()).filter(Boolean);
  if(!lines.length){showToast("Enter at least one subtask");return;}
  const wk=weekKey(S.weekStart);
  const g=(S.weeklyGoals[wk]||[]).find(x=>x.id===gid);
  if(g){if(!g.subtasks)g.subtasks=[];lines.forEach(text=>g.subtasks.push({id:uid(),text,done:false,day:""}));}
  persist();closeModal();render();showToast(`✅ Added ${lines.length} subtask${lines.length===1?"":"s"}`);
};
window.toggleWeeklyGoalSubtask=function(gid,sid){
  const wk=weekKey(S.weekStart);
  const g=(S.weeklyGoals[wk]||[]).find(x=>x.id===gid);
  if(g){const st=(g.subtasks||[]).find(s=>s.id===sid);if(st)st.done=!st.done;}
  persist();render();
};
window.renameWeeklyGoalSubtask=function(gid,sid,val){
  const wk=weekKey(S.weekStart);
  const g=(S.weeklyGoals[wk]||[]).find(x=>x.id===gid);
  if(g){const st=(g.subtasks||[]).find(s=>s.id===sid);if(st)st.text=val;}
  persist();render();
};
window.deleteWeeklyGoalSubtask=function(gid,sid){
  const wk=weekKey(S.weekStart);
  const g=(S.weeklyGoals[wk]||[]).find(x=>x.id===gid);
  if(g)g.subtasks=(g.subtasks||[]).filter(s=>s.id!==sid);
  persist();render();
};
window.setWeeklyGoalDay=function(gid,val){
  const wk=weekKey(S.weekStart);
  const g=(S.weeklyGoals[wk]||[]).find(x=>x.id===gid);
  if(g)g.day=val;
  persist();render();
};
window.setWeeklyGoalSubtaskDay=function(gid,sid,val){
  const wk=weekKey(S.weekStart);
  const g=(S.weeklyGoals[wk]||[]).find(x=>x.id===gid);
  if(g){const st=(g.subtasks||[]).find(s=>s.id===sid);if(st)st.day=val;}
  persist();render();
};
window.openDayFromWeekly=function(d){S.taskDate=d;S.view="tasks";render();window.scrollTo(0,0);};

// ═══════════════════════════════════════════════════════════
// VIEW: QUESTION TRACKER (Daily Questions)
// ═══════════════════════════════════════════════════════════
let qViewDate=today_();
function qStreak(){
  let cur=0,best=0,tmp=0;
  const dates=Object.keys(S.qLog).filter(d=>d<=today_()).sort();
  for(const d of dates){
    const q=S.qLog[d];const tot=(+q.P||0)+(+q.C||0)+(+q.M||0);
    if(tot>=(S.qTargetDaily||80)){tmp++;if(tmp>best)best=tmp;}else tmp=0;
  }
  const sortedDesc=[...dates].sort().reverse();
  for(const d of sortedDesc){
    const q=S.qLog[d];const tot=(+q.P||0)+(+q.C||0)+(+q.M||0);
    if(tot>=(S.qTargetDaily||80))cur++;else break;
  }
  return{cur,best};
}
function viewQuestions(){
  const d=qViewDate;
  const q=S.qLog[d]||{P:0,C:0,M:0,Lectures:0};
  const total=(+q.P||0)+(+q.C||0)+(+q.M||0);
  const st=qStreak();
  // last 7 days trend
  const last7=[];
  for(let i=6;i>=0;i--){const dt=new Date();dt.setDate(dt.getDate()-i);const ds=ymd(dt);const qq=S.qLog[ds]||{};const tot=(+qq.P||0)+(+qq.C||0)+(+qq.M||0);last7.push({y:tot,label:ds.slice(5)});}
  // weekly total for the week containing the currently viewed date
  const wkStart=weekStartOf(d);
  let weekTotal=0;
  for(let i=0;i<7;i++){
    const dt=new Date(wkStart+"T00:00:00");dt.setDate(dt.getDate()+i);
    const ds=ymd(dt);const qq=S.qLog[ds];
    if(qq)weekTotal+=(+qq.P||0)+(+qq.C||0)+(+qq.M||0);
  }
  const weekTarget=(S.qTargetWeekly!=null&&S.qTargetWeekly!=="")?(+S.qTargetWeekly||0):7*(S.qTargetDaily||80);
  const wkEnd=(()=>{const dt=new Date(wkStart+"T00:00:00");dt.setDate(dt.getDate()+6);return ymd(dt);})();

  return `
  <div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px">
    <button class="btn btn-sm" style="background:#1a1a30;color:var(--txt)" onclick="shiftQDate(-1)">‹</button>
    <div style="text-align:center"><div style="font-weight:900;font-size:13px">${d===today_()?"Today":fmtF(d)}</div></div>
    <button class="btn btn-sm" style="background:#1a1a30;color:var(--txt)" onclick="shiftQDate(1)">›</button>
  </div>

  <div class="g2">
    <div class="streak-box"><div style="font-size:22px">🔥</div><div><div style="font-size:17px;font-weight:900">${st.cur}</div><div style="font-size:9px;color:var(--muted)">Streak (Days)</div></div></div>
    <div class="streak-box"><div style="flex:1">
      <div class="lbl">DAILY TARGET</div>
      <input type="number" class="finput" value="${S.qTargetDaily}" onchange="setQTarget(this.value)">
    </div></div>
  </div>

  <div class="card">
    <div class="card-title">Weekly Total Q's Done</div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:21px;font-weight:900;color:${weekTarget&&weekTotal>=weekTarget?"var(--green)":"var(--accent)"}">${weekTotal} <span style="font-size:12px;color:var(--muted)">/</span> <input type="number" value="${weekTarget}" onchange="setQTargetWeekly(this.value)" style="width:56px;padding:2px 4px;font-size:12px;font-weight:800;color:var(--muted);background:#0c0c20;border:1px solid var(--border);border-radius:5px;text-align:center"></div>
      <div style="font-size:9px;color:var(--muted);text-align:right">${fmtS(wkStart)} – ${fmtS(wkEnd)}</div>
    </div>
    <div class="pbar" style="margin-top:6px"><div class="pbar-fill" style="width:${Math.min(100,Math.round((weekTotal/(weekTarget||1))*100))}%;background:#4f8ef7"></div></div>
  </div>

  <div class="card">
    <div class="card-title">PCM Breakdown</div>
    <div class="g2" style="margin-bottom:8px">
      ${["P","C","M"].map(s=>`
        <div>
          <div style="font-size:9px;font-weight:800;color:${SUBJ[s].color};margin-bottom:3px">${SUBJ[s].label}</div>
          <input type="number" class="finput" value="${q[s]||0}" onchange="setQVal('${s}',this.value)">
        </div>`).join("")}
      <div>
        <div style="font-size:9px;font-weight:800;color:var(--purple);margin-bottom:3px">Lectures</div>
        <input type="number" class="finput" value="${q.Lectures||0}" onchange="setQVal('Lectures',this.value)">
      </div>
    </div>
    <div style="text-align:center;margin:8px 0">
      <div style="font-size:9px;color:var(--muted)">TOTAL SOLVED</div>
      <div style="font-size:22px;font-weight:900;color:${total>=S.qTargetDaily?"var(--green)":"var(--accent)"}">${total} <span style="font-size:12px;color:var(--muted)">/ ${S.qTargetDaily}</span></div>
      <div class="pbar" style="margin-top:5px"><div class="pbar-fill" style="width:${Math.min(100,Math.round((total/(S.qTargetDaily||1))*100))}%;background:${total>=S.qTargetDaily?"#34d399":"#4f8ef7"}"></div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Last 7 Days Trend</div>
    ${lineChart(last7,"#34d399",Math.max(S.qTargetDaily,...last7.map(x=>x.y),10),90)}
  </div>
  `;
}
window.shiftQDate=function(n){const dt=new Date(qViewDate+"T00:00:00");dt.setDate(dt.getDate()+n);qViewDate=ymd(dt);render();};
window.setQTarget=function(v){S.qTargetDaily=+v||80;persist();render();};
window.setQTargetWeekly=function(v){S.qTargetWeekly=(v===""?null:(+v||0));persist();render();};
window.setQVal=function(key,val){if(!S.qLog[qViewDate])S.qLog[qViewDate]={P:0,C:0,M:0,Lectures:0};S.qLog[qViewDate][key]=+val||0;persist();render();};
window.setQTargetReason=function(date,val){if(!S.qLog[date])S.qLog[date]={P:0,C:0,M:0,Lectures:0};S.qLog[date].reason=val;persist();showToast("📝 Reason saved");};

// ═══════════════════════════════════════════════════════════
// VIEW: SYLLABUS TRACKER (fixed cols + custom cols + global resources)
// ═══════════════════════════════════════════════════════════
let sylSubject="P";
let sylOpen=null;
function chapterPct(s,i){
  const e=S.syllabus[s][i];
  const cols=FIXED_COLS.map(c=>c[0]).concat((S.syllabusCustomCols[s]||[]).map(c=>c.id));
  if(!cols.length)return e.status==="done"||e.status==="mastered"?100:0;
  let doneCount=0;
  cols.forEach(colId=>{

  });
  return cols.length?Math.round((doneCount/cols.length)*100):0;
}

    e.xpAwarded=true;

window.adjCounter=function(s,i,colId,isCustom,delta){

};

function blankScore(pat){
  const base={date:"",rank:"",pctile:"",comments:"",onTime:false,syllabusP:"",syllabusC:"",syllabusM:"",chapterStats:[]};
  const sub=()=>({marks:"",correct:"",incorrect:"",skipped:""});
  const ppr=()=>({P:sub(),C:sub(),M:sub(),total:"",time:""});
  if(pat==="ADV"){return{...base,p1:ppr(),p2:ppr(),grandTotal:""};}
  if(pat==="MAST_A"){return{...base,p1:ppr(),grandTotal:""};}
  return{...base,P:{...sub(),time:""},C:sub(),M:sub(),total:""};
}

// Aggregates chapter-wise question counts logged across every test result
// (S.scores[testNo].chapterStats — each row: {subj,chapter,asked,wrong,skipped})
// for one chapter — used by the Syllabus tab to show Q-count boxes next to each chapter.
function chapterQStats(subj,chapterName){
  let asked=0,wrong=0,skipped=0;
  S.tests.forEach(t=>{
    const sc=S.scores[t.no];
    if(!sc||!sc.chapterStats)return;
    sc.chapterStats.forEach(r=>{
      if(r.subj===subj&&r.chapter===chapterName){
        asked+=(+r.asked||0);wrong+=(+r.wrong||0);skipped+=(+r.skipped||0);
      }
    });
  });
  const correct=Math.max(0,asked-wrong-skipped);
  return{asked,correct,wrong,skipped};
}

// Keeps Test #No in sync with chronological (date) order. Whenever a test's
// date changes — or a new test is inserted — this resorts S.tests and
// reassigns #No sequentially (1,2,3…) by date, then remaps every place that
// referenced the OLD numbers (scores, done/skipped status, error-log links,
// last-expanded test) so no logged data gets orphaned.
function renumberTestsByDate(){
  S.tests.sort((a,b)=>a.date===b.date?a.no-b.no:a.date.localeCompare(b.date));
  const mapping={};
  S.tests.forEach((t,i)=>{
    const newNo=i+1;
    if(t.no!==newNo)mapping[t.no]=newNo;
    t.no=newNo;
  });
  if(Object.keys(mapping).length===0)return;
  const remapKeyed=(obj)=>{
    const out={};
    Object.keys(obj||{}).forEach(k=>{
      const oldNo=+k;
      const newNo=mapping[oldNo]!==undefined?mapping[oldNo]:oldNo;
      out[newNo]=obj[k];
    });
    return out;
  };
  S.scores=remapKeyed(S.scores);
  S.status=remapKeyed(S.status);
  (S.errorLog||[]).forEach(e=>{
    if(e.linkedTestNo!=null&&mapping[e.linkedTestNo]!==undefined)e.linkedTestNo=mapping[e.linkedTestNo];
  });
  if(S.expanded!=null&&mapping[S.expanded]!==undefined)S.expanded=mapping[S.expanded];
  if(window._editingScore!=null&&mapping[window._editingScore]!==undefined)window._editingScore=mapping[window._editingScore];
}

  t.syllabusP=extraP;t.syllabusC=extraC;t.syllabusM=extraM;

window.updateScoreField=function(el){
  const f=el.dataset.field,pfx=el.dataset.pfx,sub=el.dataset.sub;
  const d=window._scoreDraft;
  if(pfx&&sub){if(!d[pfx])d[pfx]={};if(!d[pfx][sub])d[pfx][sub]={};d[pfx][sub][f]=el.value;}
  else if(pfx){if(!d[pfx])d[pfx]={};d[pfx][f]=el.value;}
  else d[f]=el.value;
};
window.updateOnTime=function(el){window._scoreDraft.onTime=el.checked;};
window.refreshAccuracyDisplay=function(pfx,sub){
  const d=window._scoreDraft;
  const dd=(pfx?(d[pfx]||{})[sub]||{}:d[sub]||{});
  const t2=(+dd.correct||0)+(+dd.incorrect||0)+(+dd.skipped||0);
  const a2=t2>0?Math.round((+dd.correct/t2)*100):null;
  const cell=document.getElementById(`acc-${pfx||"x"}-${sub}`);
  if(cell)cell.textContent=a2!==null?a2+"%":"—";
  const t=S.tests.find(x=>x.no===window._editingScore);
  const pat=t?(t.pat||TYPE[t.type].pat):"MAINS";
  const overall=testAccuracyPct(d,pat);
  const overallEl=document.getElementById("acc-overall");
  if(overallEl)overallEl.textContent=overall!==null?overall+"%":"—";
};
window.finalSaveScore=function(no){
  const t=S.tests.find(x=>x.no===no);
  const pat=t?(t.pat||TYPE[t.type].pat):"MAINS";
  const draft=window._scoreDraft;
  const prevAwarded=(S.scores[no]&&S.scores[no]._xpCorrectAwarded)||0;
  const totalCorrect=sumCorrectInScore(draft,pat);
  const newCorrect=Math.max(0,totalCorrect-prevAwarded);
  draft._xpCorrectAwarded=prevAwarded+newCorrect;
  S.scores[no]=draft;
  S.status[no]="done";
  if(newCorrect>0)awardXP(newCorrect*(S.xpConfig.perCorrectTestQ||0),newCorrect+" correct answer(s) logged");
  // Auto-push wrong chapter-wise Q's into the Error Log (Mistakes tab) so
  // galat questions don't have to be typed in twice.
  let autoMistakes=0;
  (draft.chapterStats||[]).forEach(r=>{
    if(!r.chapter)return;
    const asked=+r.asked||0,wrong=+r.wrong||0,skipped=+r.skipped||0;
    if(wrong<=0)return;
    const desc=`${wrong} wrong${skipped?`, ${skipped} skipped`:""} out of ${asked||"?"} in "${t.name}" (#${no})`;
    const existing=S.errorLog.find(e=>e.autoGen&&e.linkedTestNo===no&&e.subjectKey===r.subj&&e.chapter===r.chapter);
    if(existing){existing.desc=desc;existing.date=today_();}
    else{S.errorLog.unshift({id:uid(),date:today_(),subjectKey:r.subj,chapter:r.chapter,type:"conceptual",linkedTestNo:no,desc,autoGen:true});autoMistakes++;}
  });
  persist();closeModal();render();
  showToast(autoMistakes>0?`✅ Result saved! ${autoMistakes} mistake(s) auto-logged`:"✅ Result saved!");
};
window.toggleAnalysisDone=function(no){
  const sc=S.scores[no];if(!sc)return;
  sc.analysisDone=!sc.analysisDone;
  if(sc.analysisDone&&!sc.xpAnalysisAwarded){
    sc.xpAnalysisAwarded=true;
    awardXP(S.xpConfig.perTestAnalysis,"Test analysis completed");
  }
  persist();render();
};
window.clearScoreResult=function(no){
  if(!confirm("Delete this test result? This cannot be undone."))return;
  delete S.scores[no];
  if(S.status[no]==="done")S.status[no]=null;
  persist();closeModal();render();showToast("Result deleted");
};

window.openAI=async function(no){
  const t=S.tests.find(x=>x.no===no);const sc=S.scores[no];if(!sc)return;
  const el=document.getElementById(`ai-out-${no}`);
  el.style.display="block";el.textContent="🤖 Analysing...";
  const meta=TYPE[t.type];const pat=t.pat||meta.pat;const isA=pat==="ADV"||pat==="MAST_A";
  let details="";
  if(isA){["p1","p2"].forEach(pk=>{if(!sc[pk])return;details+=`\n${pk.toUpperCase()}: `;["P","C","M"].forEach(s=>{const dd=(sc[pk]&&sc[pk][s])||{};details+=`${s}:${dd.marks}M ${dd.correct}✓ ${dd.incorrect}✗ ${dd.skipped}⊘; `;});details+=`Total:${sc[pk].total||"?"}`;});}
  else{["P","C","M"].forEach(s=>{const dd=sc[s]||{};details+=`${s}:${dd.marks}M ${dd.correct}✓ ${dd.incorrect}✗ ${dd.skipped}⊘; `;});}
  const promptTxt=`JEE 2027 aspirant test result analysis.\nTest: ${t.name} (${meta.full})\nDate: ${sc.date||t.date} | Pattern: ${PAT[pat].desc}\nRank: ${sc.rank||"N/A"} | Percentile: ${sc.pctile||"N/A"}%\nScores: ${details}\nPhysics topics: ${testSyllabusLine(t,"P")||"—"}\nChemistry topics: ${testSyllabusLine(t,"C")||"—"}\nMaths topics: ${testSyllabusLine(t,"M")||"—"}\nMistakes: ${sc.comments||"—"}\n\nProvide:\n1. PERFORMANCE SUMMARY (honest, 2 lines)\n2. SUBJECT ANALYSIS P/C/M (accuracy%, strength, gap)\n3. TOP 3 MISTAKES to fix\n4. 7-DAY ACTION PLAN\n5. ONE-LINE MOTIVATION\nBe direct, specific, no fluff.`;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:promptTxt}]})});
    const data=await r.json();
    el.textContent=(data.content&&data.content[0]&&data.content[0].text)||"No response.";
  }catch(e){el.textContent="Error: "+e.message;}
};

function testAlertsSentStore(){
  try{return JSON.parse(localStorage.getItem("jee2027hub_test_alerts_sent")||"{}");}catch(e){return{};}
}
function markTestAlertSent(key){
  const st=testAlertsSentStore();st[key]=Date.now();
  try{localStorage.setItem("jee2027hub_test_alerts_sent",JSON.stringify(st));}catch(e){}
}
window.enableTestAlerts=async function(){
  if(!("Notification" in window)){showToast("⚠️ Notifications not supported on this browser/device");return;}
  const perm=await Notification.requestPermission();
  if(perm==="granted"){localStorage.setItem("jee2027hub_test_alerts_on","1");showToast("🔔 Test alerts enabled for all tests");checkAllTestAlerts();}
  else showToast("🔕 Permission denied — enable notifications in browser settings");
  render();
};
function testAlertsEnabled(){
  return("Notification" in window)&&Notification.permission==="granted"&&localStorage.getItem("jee2027hub_test_alerts_on")==="1";
}
function checkAllTestAlerts(){
  if(!testAlertsEnabled())return;
  const sent=testAlertsSentStore();
  S.tests.forEach(t=>{
    const d=du(t.date);
    if(d<0||d>3)return; // alert window: today through 3 days out, for EVERY test
    const key=t.no+"_"+t.date+"_"+today_();
    if(sent[key])return;
    const meta=TYPE[t.type];
    const label=d===0?"is TODAY 🚨":d===1?"is TOMORROW ⚠️":`is in ${d} days`;
    try{
      const n=new Notification(`📝 ${t.name}`,{body:`#${t.no} · ${meta.full} ${label}`,icon:"",tag:key});
      n.onclick=()=>{window.focus();};
    }catch(e){}
    markTestAlertSent(key);
  });
}

  const parts=S.calMonth.split("-").map(Number);const cY=parts[0],cM=parts[1];
  const firstDay=new Date(cY,cM-1,1).getDay();
  const daysInM=new Date(cY,cM,0).getDate();
  const calTests={};
  S.tests.forEach(t=>{if(t.date.startsWith(S.calMonth)){if(!calTests[t.date])calTests[t.date]=[];calTests[t.date].push(t);}});
  const milsByDate={};S.milestones.forEach(m=>{milsByDate[m.date]=m;});
  const milHtml=S.milestones.filter(x=>mk(x.date)===S.calMonth).map(x=>`<div style="display:flex;align-items:center;gap:7px;padding:5px 10px;margin-bottom:5px;background:${x.color}0d;border:1px solid ${x.color}44;border-radius:7px">
    <span style="font-size:12px">${x.icon}</span><span style="font-size:10px;font-weight:700;color:${x.color}">${esc(x.label)} — ${fmtF(x.date)}</span>
  </div>`).join("");
  const dayCells=[];
  for(let i=0;i<firstDay;i++)dayCells.push(`<div></div>`);
  const tod=today();
  for(let i=1;i<=daysInM;i++){
    const ds=`${S.calMonth}-${String(i).padStart(2,"0")}`;
    const dts=calTests[ds]||[];const ms=milsByDate[ds];const isTdy=ds===tod;
    const cellTests=dts.map(t=>{
      const meta=TYPE[t.type];const sc=S.scores[t.no];const day_d=du(t.date);
      return`<div onclick="openScoreModal(${t.no})" style="font-size:7px;font-weight:700;color:${meta.color};background:${sc?"#0c1c0c":day_d>=1&&day_d<=3?meta.color+"25":"#12122a"};border:1px solid ${day_d>=1&&day_d<=3?meta.color+"55":"transparent"};border-radius:3px;padding:1px 3px;margin-bottom:1px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="#${t.no} ${esc(t.name)}">${sc?"★":""}${meta.live?"🔴":""}${esc(t.name)}</div>`;}).join("");
    dayCells.push(`<div style="min-height:66px;padding:3px;background:${isTdy?"#10102a":ms?ms.color+"0d":dts.length?"var(--panel)":"var(--bg)"};border:1px solid ${isTdy?"var(--accent)":ms?ms.color+"44":dts.length?"var(--border)":"transparent"};border-radius:5px">
      <div style="font-size:8px;font-weight:600;color:${isTdy?"var(--accent)":"var(--muted)"};margin-bottom:1px">${i}</div>
      ${ms?`<div style="font-size:6px;font-weight:800;color:${ms.color};line-height:1.3;margin-bottom:1px">${ms.icon}${esc(ms.label)}</div>`:""}
      ${cellTests}
    </div>`);
  }
  return`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <button class="btn btn-sm" onclick="navCal(-1)" style="background:var(--panel);border:1px solid var(--border);color:var(--accent)">←</button>
      <div style="flex:1;text-align:center;font-size:14px;font-weight:800;color:#d0d8ff">${mlbl(S.calMonth)}</div>
      <button class="btn btn-sm" onclick="navCal(1)" style="background:var(--panel);border:1px solid var(--border);color:var(--accent)">→</button>
    </div>
    ${milHtml}
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px">
      ${["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>`<div style="text-align:center;font-size:8px;font-weight:700;color:var(--muted);padding-bottom:2px">${d}</div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${dayCells.join("")}</div>
    <div style="margin-top:7px;font-size:8px;color:var(--muted)">★=scored · 🔴=live · numbers=test# · click cell to log result</div>`;
}
window.navCal=function(dir){

function viewTestsAnalytics(){
  const scoredTests=S.tests.filter(t=>S.scores[t.no]);
  if(scoredTests.length<1)return`<div style="text-align:center;padding:60px 20px;color:var(--muted)"><div style="font-size:40px;margin-bottom:8px">📊</div><div style="font-size:14px;font-weight:700;color:#4a5888">No results yet</div><div style="font-size:11px;margin-top:4px">Log your first test result to see growth graphs.</div></div>`;

  const agg=aggTotals();
  const overallSub={correct:agg.P.correct+agg.C.correct+agg.M.correct,incorrect:agg.P.incorrect+agg.C.incorrect+agg.M.incorrect,skipped:agg.P.skipped+agg.C.skipped+agg.M.skipped};
  const accSummary=`<div class="card">
    <div class="card-title">🎯 Accuracy — Physics / Chemistry / Maths / Overall</div>
    <div class="g4">
      ${[["P","Physics","#f87171"],["C","Chemistry","#34d399"],["M","Maths","#4f8ef7"]].map(([k,l,col])=>`
      <div style="text-align:center">
        <div style="font-size:18px;font-weight:900;color:${col}">${accuracyPct(agg[k])}%</div>
        <div style="font-size:8px;color:var(--muted);margin-top:2px">${l}</div>
      </div>`).join("")}
      <div style="text-align:center">
        <div style="font-size:18px;font-weight:900;color:#a78bfa">${accuracyPct(overallSub)}%</div>
        <div style="font-size:8px;color:var(--muted);margin-top:2px">OVERALL AVG</div>
      </div>
    </div>
  </div>`;

  const subCharts=[["P","Physics","#f87171"],["C","Chemistry","#34d399"],["M","Maths","#4f8ef7"]].map(([s,sl,col])=>{
    const data=scoreTrend(s);const last=data[data.length-1];const first=data[0];
    const delta=data.length>1&&last&&first?last.marks-first.marks:null;
    return`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-size:11px;font-weight:700;color:${col}">${sl} — Score Trend</div>
        ${last?`<div style="font-size:10px;color:var(--muted)">Latest: ${last.marks}/${last.maxM} (${last.acc}%)</div>`:""}
      </div>
      ${lineChart(data,col,(data[0]&&data[0].maxM)||100,72)}
      <div style="display:flex;justify-content:space-between;font-size:8px;color:var(--muted);margin-top:3px">
        ${first?`<span>First: ${first.marks}</span>`:""}
        ${data.length>1&&delta!==null?`<span style="color:${delta>=0?"#34d399":"#f87171"}">${delta>=0?"+":""}${delta} overall</span>`:""}
        ${last&&data.length>1?`<span>Latest: ${last.marks}</span>`:""}
      </div>
    </div>`;}).join("");

  const accData=scoredTests.map(t=>{
    const sc=S.scores[t.no];const pt=t.pat||TYPE[t.type].pat;
    let cor=0,tot=0;
    const add=s=>{cor+=+s.correct||0;tot+=+s.correct||0;tot+=+s.incorrect||0;tot+=+s.skipped||0;};
    if(pt==="MAINS"||pt==="NDA_PAT")["P","C","M"].forEach(s=>sc[s]&&add(sc[s]));
    else["p1","p2"].forEach(pk=>sc[pk]&&["P","C","M"].forEach(s=>sc[pk][s]&&add(sc[pk][s])));
    return{y:tot>0?Math.round((cor/tot)*100):0,label:t.name};
  });

  const perTestBars=scoredTests.slice(-12).map(t=>{
    const sc=S.scores[t.no];const pt=t.pat||TYPE[t.type].pat;
    let cor=0,inc=0,skp=0;
    const add=s=>{cor+=+s.correct||0;inc+=+s.incorrect||0;skp+=+s.skipped||0;};
    if(pt==="MAINS"||pt==="NDA_PAT")["P","C","M"].forEach(s=>sc[s]&&add(sc[s]));
    else["p1","p2"].forEach(pk=>sc[pk]&&["P","C","M"].forEach(s=>sc[pk][s]&&add(sc[pk][s])));
    const tot=cor+inc+skp||1;
    return`<div style="margin-bottom:7px">
      <div style="display:flex;justify-content:space-between;font-size:9px;margin-bottom:2px">

      </div>
      <div style="height:6px;border-radius:99px;overflow:hidden;display:flex">
        <div style="width:${(cor/tot)*100}%;background:#34d399"></div>
        <div style="width:${(inc/tot)*100}%;background:#f87171"></div>
        <div style="width:${(skp/tot)*100}%;background:#fbbf24"></div>
      </div>
    </div>`;}).join("");

  const rankData=scoredTests.filter(t=>S.scores[t.no]&&S.scores[t.no].rank).map(t=>({y:+S.scores[t.no].rank,label:t.name}));

  return`
    ${accSummary}
    ${subCharts}
    <div class="card">
      <div style="font-size:11px;font-weight:700;color:#a78bfa;margin-bottom:6px">Overall Accuracy % Trend</div>

      <div style="font-size:11px;font-weight:700;color:var(--txt);margin-bottom:8px">Question Breakdown per Test (last 12)</div>
      <div style="font-size:8px;color:var(--muted);margin-bottom:6px;display:flex;gap:12px"><span style="color:#34d399">■ Correct</span><span style="color:#f87171">■ Wrong</span><span style="color:#fbbf24">■ Skipped</span></div>
      ${perTestBars}
    </div>
    ${rankData.length>=2?`<div class="card">
      <div style="font-size:11px;font-weight:700;color:#fbbf24;margin-bottom:6px">🏅 Rank Trend <span style="font-size:9px;color:var(--muted)">(lower = better)</span></div>
      ${lineChart(rankData,"#fbbf24",null,72)}
    </div>`:""}`;
}

      if(d.milestones&&d.milestones.length)S.milestones=d.milestones;

      if(d.focusDailyLog)S.focusDailyLog=d.focusDailyLog;

if(typeof d.longestFocusSession==="number")S.longestFocusSession=d.longestFocusSession;if(typeof d.longSitLimitMin==="number")S.longSitLimitMin=d.longSitLimitMin;if(d.qTargetWeekly!==undefined)S.qTargetWeekly=d.qTargetWeekly;if(d.customSubjects)S.customSubjects=d.customSubjects;if(typeof d.realityWastedHours==="number")S.realityWastedHours=d.realityWastedHours;if(typeof d.countdownRotateSec==="number")S.countdownRotateSec=d.countdownRotateSec;if(d.screenLog)S.screenLog=d.screenLog;if(typeof d.bannerRotateSec==="number")S.bannerRotateSec=d.bannerRotateSec;if(Array.isArray(d.bannerImages))S.bannerImages=d.bannerImages;if(typeof d.bannerRotateOn==="boolean")S.bannerRotateOn=d.bannerRotateOn;if(d.bannerFitMode)S.bannerFitMode=d.bannerFitMode;if(d.appBg)S.appBg=d.appBg;
      if(d.nextDayTarget)S.nextDayTarget=d.nextDayTarget;
      await persist();

const MISTAKE_TYPES=[["conceptual","Conceptual","#f43f5e"],["calculative","Calculative","#4f8ef7"],["silly","Silly Mistake","#fbbf24"],["formula","Formula","#a78bfa"]];
let errLogDraft={subjectKey:"P",chapter:"",type:"conceptual",linkedTestNo:"",desc:""};
let errFilterSubj="all",errFilterType="all";
