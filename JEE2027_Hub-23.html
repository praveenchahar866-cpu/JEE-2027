function mistakeProfileSVG(){
  const counts={};MISTAKE_TYPES.forEach(([k])=>counts[k]=0);
  S.errorLog.forEach(e=>{counts[e.type]=(counts[e.type]||0)+1;});
  const total=S.errorLog.length;
  if(!total)return`<div style="text-align:center;padding:26px 0"><div style="font-size:34px;opacity:.35">◔</div><div style="font-size:11px;color:var(--muted);margin-top:8px">Log your first mistake to generate your profile.</div></div>`;
  let acc=0;const R=42,CX=54,CY=54;
  const slices=MISTAKE_TYPES.map(([k,label,color])=>{
    const frac=counts[k]/total;
    const a0=acc*2*Math.PI,a1=(acc+frac)*2*Math.PI;acc+=frac;
    const x0=CX+R*Math.sin(a0),y0=CY-R*Math.cos(a0),x1=CX+R*Math.sin(a1),y1=CY-R*Math.cos(a1);
    const large=frac>0.5?1:0;
    const d=frac>=0.9999?`M${CX},${CY-R} A${R},${R} 0 1 1 ${CX-0.01},${CY-R} Z`:`M${CX},${CY} L${x0},${y0} A${R},${R} 0 ${large} 1 ${x1},${y1} Z`;
    return counts[k]>0?`<path d="${d}" fill="${color}" opacity="0.85"/>`:"";
  }).join("");
  return`<div style="display:flex;align-items:center;gap:14px;padding:6px 0">
    <svg width="108" height="108" viewBox="0 0 108 108">${slices}<circle cx="${CX}" cy="${CY}" r="20" fill="#0a0a18"/></svg>
    <div style="flex:1">
      ${MISTAKE_TYPES.map(([k,label,color])=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <span style="width:9px;height:9px;border-radius:2px;background:${color};flex-shrink:0"></span>
        <span style="font-size:10px;flex:1">${label}</span>
        <span style="font-size:10px;font-weight:800;color:var(--muted)">${counts[k]} (${total?Math.round(counts[k]/total*100):0}%)</span>
      </div>`).join("")}
      <div style="font-size:9px;color:var(--muted);margin-top:4px">Total mistakes logged: ${total}</div>
    </div>
  </div>`;
}

    <div class="card-title" style="display:flex;align-items:center;gap:7px;font-size:16px;color:#fff"><span style="color:#f43f5e">⚠️</span> Log a New Mistake</div>
    <div class="g2" style="margin-bottom:8px">
      <div><div class="lbl">Subject</div>
        <div style="display:flex;gap:6px">
          <select class="finput" style="flex:1" onchange="setErrDraftField('subjectKey',this.value)">
            ${Object.keys(ALL_SUBJ()).map(k=>`<option value="${k}" ${errLogDraft.subjectKey===k?"selected":""}>${ALL_SUBJ()[k].label}</option>`).join("")}
          </select>
          <button type="button" class="btn-xs" style="background:#1a1a30;color:#f43f5e;padding:0 9px;border:1px solid var(--border)" onclick="addCustomSubjectAndRender('subjectKey')">+</button>
        </div>
      </div>
      <div><div class="lbl">Topic / Chapter</div>
        <select class="finput" onchange="setErrDraftField('chapter',this.value)">
          <option value="">— select —</option>
          ${chapters.map(c=>`<option value="${esc(c)}" ${errLogDraft.chapter===c?"selected":""}>${esc(c)}</option>`).join("")}
        </select>
      </div>
    </div>
    <div class="lbl">Type of Mistake</div>
    <div class="g2" style="margin-bottom:8px">
      ${MISTAKE_TYPES.map(([k,label,color])=>`<button class="nav-btn" style="background:${errLogDraft.type===k?color:"#12122a"};color:${errLogDraft.type===k?"#04102a":"var(--muted)"};font-weight:800;border:1px solid ${errLogDraft.type===k?color:"var(--border)"}" onclick="setErrDraftField('type','${k}')">${label}</button>`).join("")}
    </div>
    <div class="lbl">Linked Mock Test (optional)</div>
    <select class="finput" style="margin-bottom:8px" onchange="setErrDraftField('linkedTestNo',this.value)">
      <option value="">None</option>
      ${S.tests.map(t=>`<option value="${t.no}" ${String(errLogDraft.linkedTestNo)===String(t.no)?"selected":""}>#${t.no} — ${esc(t.name)}</option>`).join("")}
    </select>
    <div style="display:flex;justify-content:space-between"><div class="lbl">Mistake Description</div><span style="font-size:8px;color:var(--muted)">ⓘ Markdown supported</span></div>
    <textarea id="err-desc" class="finput" style="min-height:70px;margin-bottom:10px" placeholder="What went wrong and how to avoid it next time? (Use **bold**, *italic*, or \`code\`)" onchange="setErrDraftField('desc',this.value)">${esc(errLogDraft.desc)}</textarea>
    <button class="btn" style="width:100%;padding:11px;background:#f43f5e;color:#fff;font-weight:900;border-radius:10px;border:none;font-size:13px" onclick="logMistake()">+ Log Mistake</button>
  </div>

  <div class="card">
    <div class="card-title">Mistake Profile</div>
    ${mistakeProfileSVG()}
  </div>

  <div class="card" style="padding-bottom:6px">
    <div class="card-title">Recent Mistakes</div>
    <div style="display:flex;gap:4px;overflow-x:auto;padding-bottom:6px">
      <button class="nav-btn ${errFilterSubj==="all"?"active":""}" onclick="setErrFilter('subj','all')">All Subjects</button>
      ${Object.keys(ALL_SUBJ()).map(k=>`<button class="nav-btn ${errFilterSubj===k?"active":""}" style="color:${ALL_SUBJ()[k].color}" onclick="setErrFilter('subj','${k}')">● ${ALL_SUBJ()[k].label}</button>`).join("")}
    </div>
    <div style="display:flex;gap:4px;overflow-x:auto;padding-bottom:8px">
      <button class="nav-btn ${errFilterType==="all"?"active":""}" onclick="setErrFilter('type','all')">All Types</button>
      ${MISTAKE_TYPES.map(([k,label])=>`<button class="nav-btn ${errFilterType===k?"active":""}" onclick="setErrFilter('type','${k}')">${label}</button>`).join("")}
    </div>
  </div>
  ${filtered.length?filtered.map(e=>{
    const mt=MISTAKE_TYPES.find(x=>x[0]===e.type)||MISTAKE_TYPES[0];
    const linkedTest=e.linkedTestNo?S.tests.find(t=>t.no==e.linkedTestNo):null;
    return`<div class="card" style="padding:10px 12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px">
        <div style="flex:1">
          <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
            <span class="pill" style="background:${ALL_SUBJ()[e.subjectKey].color}22;color:${ALL_SUBJ()[e.subjectKey].color}">${ALL_SUBJ()[e.subjectKey].label}</span>
            <span class="pill" style="background:${mt[2]}22;color:${mt[2]}">${mt[1]}</span>
            ${linkedTest?`<span class="pill" style="background:#1a1a30;color:var(--muted)">#${linkedTest.no}</span>`:""}
            <span style="font-size:8px;color:var(--muted)">${fmtS(e.date)}</span>
          </div>
          ${e.chapter?`<div style="font-weight:800;font-size:12px;margin-top:4px">${esc(e.chapter)}</div>`:""}
          ${e.desc?`<div style="font-size:11px;color:var(--muted);margin-top:3px;line-height:1.5">${mdLite(e.desc)}</div>`:""}
        </div>
        <button class="btn-xs del-btn" style="background:none;color:var(--muted)" onclick="deleteMistake('${e.id}')">✕</button>
      </div>
    </div>`;
  }).join(""):`<div class="card" style="text-align:center;color:var(--muted);font-size:11px;padding:24px 0;font-style:italic">No mistakes found for this filter combination.</div>`}
  `;
}

// ─── BOOT ────────────────────────────────────────────────────
(async()=>{
  await loadStoredData();
  render();
  applyAppBackground();
  startCloudPolling();
  showToast(STORE.hasArtifactStorage?"💾 Data loaded":"💾 Data loaded (local storage mode)");
  setTimeout(()=>checkMilestoneAlerts(true),800);
})();
setInterval(()=>checkMilestoneAlerts(true),3600000);
window.addEventListener("beforeunload",()=>{persist();});
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="hidden")persist();});
</script>
</body>
</html>
